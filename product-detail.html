    <style>
        .detail-wrapper {
            padding: 7rem var(--spacing-xl) 4rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .breadcrumb a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            color: var(--green);
        }

        .breadcrumb span {
            color: var(--green);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        /* IMAGE */
        .detail-image-wrap {
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 4/3;
            position: relative;
            background: var(--surface);
            opacity: 0;
            transform: translateX(-20px);
            animation: fadeRight 0.7s ease forwards 0.1s;
        }

        @keyframes fadeRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 0.5rem;
        }

        /* INFO */
        .detail-info {
            position: sticky;
            top: 5.5rem;
            opacity: 0;
            transform: translateX(20px);
            animation: fadeLeft 0.7s ease forwards 0.2s;
        }

        @keyframes fadeLeft {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-brand {
            font-family: var(--font-body);
            font-size: 0.75rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--green);
            margin-bottom: 0.5rem;
        }

        .detail-name {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.15;
            margin-bottom: 1rem;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .stars {
            color: var(--green);
            font-size: 0.9rem;
        }

        .rating-count {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--green);
            background: rgba(62, 207, 142, 0.1);
            border: 1px solid rgba(62, 207, 142, 0.2);
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
        }

        .stock-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
        }

        .price-block {
            padding: 1.5rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.8rem;
        }

        .detail-price {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--green);
        }

        .detail-price-note {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .spec-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            transition: border-color 0.2s;
        }

        .spec-item:hover {
            border-color: rgba(62, 207, 142, 0.2);
        }

        .spec-label {
            font-family: var(--font-body);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .spec-value {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-add {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: var(--green);
            color: #0a0a0a;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 700;
            padding: 0.85rem;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(62, 207, 142, 0.3);
        }

        .btn-buy {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: transparent;
            border: 1px solid rgba(62, 207, 142, 0.35);
            color: var(--green);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.85rem;
            border-radius: 9px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-buy:hover {
            background: rgba(62, 207, 142, 0.07);
        }

        /* TABS */
        .tabs-section {
            margin-top: 4rem;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: var(--text-muted);
            padding: 0.9rem 1.5rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            margin-bottom: -1px;
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--green);
            border-bottom-color: var(--green);
        }

        .tab-content {
            padding: 2rem 0;
            display: none;
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content p+p {
            margin-top: 1rem;
        }

        .tab-content strong {
            color: var(--text-primary);
        }

        /* RELATED */
        .related-section {
            padding: 4rem var(--spacing-xl);
            border-top: 1px solid var(--border);
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: var(--font-body);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--green);
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .section-label::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--green);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .mini-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.3s, border-color 0.3s;
            display: block;
        }

        .mini-card:hover {
            transform: translateY(-4px);
            border-color: rgba(62, 207, 142, 0.3);
        }

        .mini-card-img {
            aspect-ratio: 16/9;
            background: var(--surface-raised);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-card-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 0.5rem;
            transition: transform 0.3s;
        }

        .mini-card:hover .mini-card-img img {
            transform: scale(1.04);
        }

        .mini-card-body {
            padding: 1rem;
        }

        .mini-card-name {
            font-family: var(--font-display);
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .mini-card-price {
            font-family: var(--font-display);
            font-size: 0.95rem;
            color: var(--green);
            font-weight: 700;
        }

        /* NOT FOUND */
        .not-found {
            text-align: center;
            padding: 6rem 2rem;
        }

        .not-found h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .not-found p {
            font-family: var(--font-body);
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .not-found a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--green);
            color: #0a0a0a;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            text-decoration: none;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 2rem var(--spacing-xl);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        footer p {
            font-family: var(--font-body);
            font-size: .78rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--green);
            text-decoration: none;
        }

        @media(max-width:1024px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .detail-info {
                position: static;
            }

            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:640px) {
            .related-grid {
                grid-template-columns: 1fr;
            }

            .specs-grid {
                grid-template-columns: 1fr;
            }

            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>

                image: 'images/laptop-11.jpg',
                price: 95000, rating: '4.6', reviews: 77,
                specs: { Processor: 'Intel i5-1235U', RAM: '8GB LPDDR5', Storage: '256GB SSD', Display: '13.5" Touch', Battery: 'Up to 19 hrs', OS: 'Windows 11' },
                description: `Elegantly slim and beautifully crafted with a high-resolution touchscreen, exceptional keyboard, and tight Windows 11 integration. The Surface Laptop 5 is Microsoft's vision of the perfect Windows experience.`,
                fullSpecs: `<strong>Processor:</strong> Intel Core i5-1235U<br><strong>Memory:</strong> 8GB LPDDR5<br><strong>Storage:</strong> 256GB SSD<br><strong>Display:</strong> 13.5" PixelSense Touch, 2256×1504<br><strong>Battery:</strong> 47.4Wh, up to 19 hours<br><strong>Ports:</strong> USB-C, USB-A, Surface Connect<br><strong>Weight:</strong> 1.27 kg`,
                related: ['hp-elitebook-840', 'lenovo-thinkpad-x1', 'hp-spectre-x360']
            },
            'acer-swift-3': {
                brand: 'Acer', name: 'Swift 3 SF314',
                image: 'images/laptop-12.jpg',
                price: 55000, rating: '4.4', reviews: 312,
                specs: { Processor: 'AMD Ryzen 5 7530U', RAM: '8GB LPDDR4', Storage: '512GB SSD', Display: '14" FHD IPS', Battery: 'Up to 10 hrs', OS: 'Windows 11' },
                description: `Lightweight, affordable, and reliable — the Acer Swift 3 is built for students who need a fast, portable laptop without breaking the bank. Military-grade durability meets everyday value in this popular campus companion.`,
                fullSpecs: `<strong>Processor:</strong> AMD Ryzen 5 7530U<br><strong>Memory:</strong> 8GB LPDDR4<br><strong>Storage:</strong> 512GB SSD<br><strong>Display:</strong> 14" FHD IPS, 1920×1080<br><strong>Battery:</strong> 56Wh, up to 10 hours<br><strong>Ports:</strong> USB-A, USB-C, HDMI, SD Card<br><strong>Weight:</strong> 1.45 kg`,
                related: ['lenovo-ideapad-5', 'asus-vivobook-15', 'dell-inspiron-15']
            }
        };

        /* ══ LOAD PRODUCT FROM URL ══ */
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const product = products[id];
        const content = document.getElementById('pageContent');

        if (!product) {
            // Product not found
            content.innerHTML = `
        <div class="not-found">
          <h2>Product not found</h2>
          <p>The laptop you're looking for doesn't exist or the link is broken.</p>
          <a href="products.html">← Back to Products</a>
        </div>`;
        } else {
            // Update page title
            document.title = `${product.name} — PixelCart`;

            // Build specs grid HTML
            const specsHTML = Object.entries(product.specs).map(([label, value]) => `
        <div class="spec-item">
          <div class="spec-label">${label}</div>
          <div class="spec-value">${value}</div>
        </div>`).join('');

            // Build related products HTML
            const relatedHTML = product.related.map(rid => {
                const r = products[rid];
                if (!r) return '';
                return `
          <a href="product-detail.html?id=${rid}" class="mini-card">
            <div class="mini-card-img">
              <img src="${r.image}" alt="${r.name}"/>
            </div>
            <div class="mini-card-body">
              <div class="mini-card-name">${r.name}</div>
              <div class="mini-card-price">KES ${r.price.toLocaleString()}</div>
            </div>
          </a>`;
            }).join('');

            // Build description paragraphs
            const descHTML = product.description.split('\n\n')
                .map(p => `<p>${p.trim()}</p>`).join('');

            content.innerHTML = `
        <div class="detail-wrapper">
          <div class="breadcrumb">
            <a href="index.html">Home</a> /
            <a href="products.html">Products</a> /
            <span>${product.name}</span>
          </div>

          <div class="detail-grid">
            <div class="detail-image-wrap">
              <img src="${product.image}" alt="${product.name}"/>
            </div>

            <div class="detail-info">
              <div class="detail-brand">${product.brand}</div>
              <h1 class="detail-name">${product.name}</h1>

              <div class="detail-meta">
                <div class="stars">★★★★★</div>
                <span class="rating-count">${product.rating} · ${product.reviews} reviews</span>
                <span class="stock-badge">In Stock</span>
              </div>

              <div class="price-block">
                <div class="detail-price">KES ${product.price.toLocaleString()}</div>
                <div class="detail-price-note">Pay via M-Pesa · Free delivery in Nairobi</div>
              </div>

              <div class="specs-grid">${specsHTML}</div>

              <button class="btn-add" onclick="addToCart()">🛒 Add to Cart</button><br>

              <a href="cart.html" class="btn-buy">⚡ Buy Now with M-Pesa</a>
            </div>
          </div>

          <div class="tabs-section">
            <div class="tabs">
              <button class="tab-btn active" onclick="switchTab('desc',this)">Description</button>
              <button class="tab-btn" onclick="switchTab('specs',this)">Full Specs</button>
              <button class="tab-btn" onclick="switchTab('reviews',this)">Reviews (${product.reviews})</button>
            </div>
            <div class="tab-content active" id="tab-desc">${descHTML}</div>
            <div class="tab-content" id="tab-specs"><p>${product.fullSpecs}</p></div>
            <div class="tab-content" id="tab-reviews">
              <p style="font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--green);">${product.rating} / 5</p>
              <p>Based on ${product.reviews} verified purchases from confirmed PixelCart buyers.</p>
            </div>
          </div>
        </div>

        <section class="related-section">
          <div class="section-label">You may also like</div>
          <h2 class="section-title">Related Laptops</h2>
          <div class="related-grid">${relatedHTML}</div>
        </section>`;

            // Store current product for cart
            window.currentProduct = product;
            window.currentProductId = id;
        }

        /* ── Cart + tab functions ── */
        Cart.updateBadge();

        function addToCart() {
            if (!window.currentProduct) return;
            Cart.add({
                id: window.currentProductId,
                name: window.currentProduct.name,
                price: window.currentProduct.price,
                qty: 1
            });
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            el.classList.add('active');
        }

        window.addEventListener('scroll', () => {
            document.querySelector('.navbar').style.borderBottomColor =
                window.scrollY > 20 ? 'rgba(62,207,142,0.15)' : 'var(--border)';
        });
    </script>

</body>

</html>
